<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OsceAI - Candidate Instructions</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="dashboard-body">

    <div class="dashboard-layout">
        <aside class="sidebar">
            <div class="sidebar-logo">OsceAI</div>
            <nav class="sidebar-nav">
                <button class="sidebar-item"
                        onclick="window.location.href='/dashboard?view=home'">
                    <span class="sidebar-icon">🏠</span>
                    <span class="sidebar-label">Home</span>
                </button>
                <button class="sidebar-item active"
                        onclick="window.location.href='/dashboard?view=cases'">
                    <span class="sidebar-icon">📋</span>
                    <span class="sidebar-label">OSCE Cases</span>
                </button>
                <button class="sidebar-item"
                        onclick="window.location.href='/mock_exam'">
                    <span class="sidebar-icon">🏥</span>
                    <span class="sidebar-label">Mock Exam</span>
                </button>
                <button class="sidebar-item"
                        onclick="window.location.href='/dashboard?view=profile'">
                    <span class="sidebar-icon">👤</span>
                    <span class="sidebar-label">Profile</span>
                </button>
            </nav>
            <div class="sidebar-footer">
                <a href="/logout" class="sidebar-logout">
                    <span>⬅️</span>
                    <span>Logout</span>
                </a>
            </div>
        </aside>

        <div class="dashboard-main">
            <header class="dashboard-topbar">
                <div class="topbar-left">
                    <div class="breadcrumb">
                        <a href="/dashboard">Home</a>
                        <span>/</span>
                        <a href="/dashboard?view=cases">OSCE Cases</a>
                        <span>/</span>
                        <span class="breadcrumb-active" id="breadcrumbCase">
                            Candidate Instructions
                        </span>
                    </div>
                </div>
                <div class="topbar-right">
                    <div class="topbar-tabs">
                        <button class="topbar-tab"
                                onclick="window.location.href='/dashboard?view=home'">
                            Home
                        </button>
                        <button class="topbar-tab active"
                                onclick="window.location.href='/dashboard?view=cases'">
                            OSCE Cases
                        </button>
                        <button class="topbar-tab"
                                onclick="window.location.href='/mock_exam'">
                            Mock Exam
                        </button>
                        <button class="topbar-tab"
                                onclick="window.location.href='/dashboard?view=profile'">
                            Profile
                        </button>
                    </div>
                    <div class="topbar-user">
                        <div class="topbar-avatar" id="topbarAvatar">S</div>
                        <span id="topbarName">Student</span>
                    </div>
                </div>
            </header>

            <div class="dashboard-content">
                <div class="view-header">
                    <div class="mock-phase-header">
                        <span class="mock-badge">Reading Time</span>
                        <span class="mock-case-counter" id="caseBadge">
                            Loading...
                        </span>
                    </div>
                </div>

                <div class="instructions-layout">
                    <div class="instructions-left">
                        <div class="candidate-title">
                            <h2>Candidate Instructions</h2>
                        </div>
                        <div class="candidate-instructions-card"
                             style="margin-top:16px;">
                            <ul class="candidate-list" id="instructionsList">
                                <li>Loading instructions...</li>
                            </ul>
                        </div>

                        <div class="candidate-notes" style="margin-top:16px;">
                            <h3>Your notes</h3>
                            <div class="notes-input-wrapper">
                                <textarea id="candidateNotes"
                                          placeholder="You can write notes here, which will visible to you in history taking session."></textarea>
                            </div>
                        </div>
                    </div>

                    <div class="instructions-right">
                        <div class="mock-info-card" style="text-align:center;">
                            <h3>Reading Time</h3>
                            <div class="instructions-timer-display"
                                 id="candidateTimer">02:00</div>
                            <p class="instructions-timer-label">
                                Time available before the station
                            </p>
                            <div class="candidate-timer-controls"
                                 style="justify-content:center;">
                                <button class="timer-ctrl-btn"
                                        onclick="adjustTimer(-60)"
                                        title="Minus 1 minute">-</button>
                                <button class="timer-ctrl-btn start-btn"
                                        onclick="toggleReadingTimer()"
                                        id="timerToggleBtn"
                                        title="Start or pause timer">▶</button>
                                <button class="timer-ctrl-btn"
                                        onclick="resetTimer()"
                                        title="Reset">↻</button>
                                <button class="timer-ctrl-btn"
                                        onclick="adjustTimer(60)"
                                        title="Plus 1 minute">+</button>
                            </div>
                            <button class="btn" onclick="startSimulation()"
                                    style="width:100%; margin-top:16px;">
                                Start
                            </button>
                            <a href="/dashboard?view=cases"
                               class="btn-secondary"
                               style="display:block; text-align:center;
                               margin-top:10px; padding:14px;">
                                Back to Cases
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const caseId = params.get("case_id") || "abdominal_1";
        const caseLabel = params.get("case_label") || "Case";

        const caseNames = {
            "abdominal_1": "Abdominal pain 01",
            "abdominal_2": "Abdominal pain 02",
            "abdominal_3": "Abdominal pain 03",
            "chest_1": "Chest pain 01",
            "chest_2": "Chest pain 02",
            "chest_3": "Chest pain 03",
            "cough_1": "Cough 01",
            "cough_2": "Cough 02",
            "cough_3": "Cough 03"
        };

        const displayCase = caseNames[caseId] || decodeURIComponent(caseLabel);
        document.getElementById("breadcrumbCase").textContent = displayCase;
        document.getElementById("caseBadge").textContent = displayCase;

        let timerSeconds = 480;
        let timerInterval = null;
        let timerPaused = false;
        let timerStarted = false;

        async function loadTopbarUser() {
            try {
                const res = await fetch("/get_current_user");
                const data = await res.json();
                const name = data.name || "Student";
                document.getElementById("topbarName").textContent = name;
                document.getElementById("topbarAvatar").textContent =
                    name.charAt(0).toUpperCase();
            } catch (err) {
                console.error(err);
            }
        }

        function updateTimerDisplay() {
            const mins = Math.floor(timerSeconds / 60);
            const secs = timerSeconds % 60;
            document.getElementById("candidateTimer").textContent =
                `${String(mins).padStart(2,"0")}:${String(secs).padStart(2,"0")}`;
        }

        function adjustTimer(seconds) {
            timerSeconds = Math.max(60, timerSeconds + seconds);
            updateTimerDisplay();
        }

        function toggleReadingTimer() {
            const btn = document.getElementById("timerToggleBtn");
            if (!timerStarted || timerPaused) {
                clearInterval(timerInterval);
                timerInterval = setInterval(countDown, 1000);
                timerStarted = true;
                timerPaused = false;
                btn.textContent = "⏸";
            } else {
                clearInterval(timerInterval);
                timerPaused = true;
                btn.textContent = "▶";
            }
        }

        function resetTimer() {
            clearInterval(timerInterval);
            timerSeconds = 120;
            timerStarted = false;
            timerPaused = false;
            document.getElementById("timerToggleBtn").textContent = "▶";
            updateTimerDisplay();
        }

        function countDown() {
            timerSeconds--;
            updateTimerDisplay();
            if (timerSeconds <= 0) {
                clearInterval(timerInterval);
                document.getElementById("candidateTimer").textContent = "00:00";
            }
        }

        function startSimulation() {
            const notes = document.getElementById("candidateNotes").value;
            sessionStorage.setItem("candidateNotes", notes);
            sessionStorage.setItem("caseLabel",
                decodeURIComponent(caseLabel));
            const encodedLabel = encodeURIComponent(
                decodeURIComponent(caseLabel));
            window.location.href =
                `/pre_check?case_id=${caseId}&case_label=${encodedLabel}`;
        }

        async function loadInstructions() {
            try {
                const res = await fetch(
                    `/get_candidate_instructions?case_id=${caseId}`
                );
                const data = await res.json();
                const list = document.getElementById("instructionsList");
                list.innerHTML = `
                    <li>You are a <strong>${data.role}</strong></li>
                    <li>${data.patient}</li>
                    ${data.complaint ?
                        `<li>Their presenting complaint is
                        <strong>${data.complaint}</strong></li>` : ""}
                    <li>${data.task}</li>
                    <li>${data.note}</li>
                `;
            } catch (err) {
                console.error("Could not load instructions:", err);
            }
        }

        loadTopbarUser();
        loadInstructions();
        updateTimerDisplay();
    </script>

</body>
</html>
