<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OsceAI - Post Simulation Check</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="check-container">

        <div class="check-header">
            <h2>Before You Leave the Consultation</h2>
            <p>Please confirm the following closing steps</p>
        </div>

        <div class="check-body">

            <div class="check-section">
                <h3>📝 Closing the Consultation</h3>
                <label class="check-item">
                    <input type="checkbox" id="post1" onchange="updateButton()">
                    <span>I summarised the key history points back to the patient</span>
                </label>
                <label class="check-item">
                    <input type="checkbox" id="post2" onchange="updateButton()">
                    <span>I asked the patient if there was anything I missed</span>
                </label>
                <label class="check-item">
                    <input type="checkbox" id="post3" onchange="updateButton()">
                    <span>I thanked the patient for their time</span>
                </label>
            </div>

            <div class="check-section">
                <h3>🧼 Infection Control</h3>
                <label class="check-item">
                    <input type="checkbox" id="post4" onchange="updateButton()">
                    <span>I disposed of PPE appropriately</span>
                </label>
                <label class="check-item">
                    <input type="checkbox" id="post5" onchange="updateButton()">
                    <span>I washed my hands after the consultation</span>
                </label>
            </div>

            <div class="check-note">
                <p>⚠️ These items are based on your self declaration. Please answer honestly.</p>
            </div>

            <button class="btn" id="nextBtn" onclick="goToExaminer()" disabled>
                Confirmed — Proceed to Examiner →
            </button>

        </div>

    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const caseId = params.get("case_id");

        function updateButton() {
            const allChecked =
                document.getElementById("post1").checked &&
                document.getElementById("post2").checked &&
                document.getElementById("post3").checked &&
                document.getElementById("post4").checked &&
                document.getElementById("post5").checked;
            document.getElementById("nextBtn").disabled = !allChecked;
        }

        function goToExaminer() {
            const postChecks = {
                summarised: true,
                asked_if_missed: true,
                thanked_patient: true,
                disposed_ppe: true,
                washed_hands_after: true
            };
            sessionStorage.setItem("postChecks", JSON.stringify(postChecks));
            window.location.href = `/examiner?case_id=${caseId}`;
        }
    </script>
</body>
</html>
